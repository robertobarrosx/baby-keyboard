<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Animais!</title>
  <style>
    :root {
      --sky-a: #7ed6df;
      --sky-b: #f8efba;
      --sky-c: #f6b93b;
      --ground-a: #43a047;
      --ground-b: #7cb342;
      --hill-a: #2ecc71;
      --hill-b: #16a085;
      --accent: #ff7675;
      --ink: #17324d;
      --glow: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: none;
      background: #86d7f2;
    }

    body {
      color: white;
    }

    #start-screen,
    #game {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #start-screen {
      z-index: 100;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #4fc3f7 0%, #a7e8bd 46%, #ffe082 100%);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    #start-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    .start-scenery {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .start-sun {
      position: absolute;
      top: 9%;
      right: 10%;
      width: 7rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ffd166;
      box-shadow:
        0 0 0 1.1rem rgba(255, 209, 102, 0.18),
        0 0 4rem rgba(255, 209, 102, 0.55);
      animation: sunPulse 3.4s ease-in-out infinite;
    }

    .start-hill {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -14%;
      height: 34%;
      border-radius: 50% 50% 0 0;
      background: linear-gradient(135deg, #3fa34d, #80c342);
      box-shadow: inset 0 1.2rem 0 rgba(255, 255, 255, 0.12);
    }

    .start-hill.back {
      bottom: 3%;
      height: 24%;
      background: linear-gradient(135deg, #2fb7a2, #68d391);
      opacity: 0.74;
      transform: translateX(-18%);
    }

    .start-cloud {
      position: absolute;
      width: 10rem;
      height: 3.5rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      filter: blur(0.1px);
      animation: drift 12s ease-in-out infinite alternate;
    }

    .start-cloud::before,
    .start-cloud::after {
      content: "";
      position: absolute;
      bottom: 1.1rem;
      border-radius: 50%;
      background: inherit;
    }

    .start-cloud::before {
      left: 1.2rem;
      width: 4rem;
      aspect-ratio: 1;
    }

    .start-cloud::after {
      right: 1.1rem;
      width: 5rem;
      aspect-ratio: 1;
    }

    .start-cloud.one {
      left: 7%;
      top: 13%;
    }

    .start-cloud.two {
      right: 13%;
      top: 35%;
      transform: scale(0.78);
      animation-delay: -4s;
    }

    .start-cloud.three {
      left: 38%;
      top: 9%;
      transform: scale(0.62);
      animation-delay: -8s;
    }

    .start-content {
      position: relative;
      display: grid;
      place-items: center;
      gap: 1.1rem;
      padding: 2rem;
      text-align: center;
      transform: translateY(-2rem);
    }

    .animal-ring {
      position: relative;
      width: 18rem;
      aspect-ratio: 1;
      animation: ringFloat 5s ease-in-out infinite;
    }

    .animal-ring span {
      position: absolute;
      display: grid;
      place-items: center;
      width: 4.8rem;
      aspect-ratio: 1;
      border-radius: 50%;
      font-size: 2.6rem;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: 0 0.9rem 2.6rem rgba(29, 72, 91, 0.18);
      animation: tinyBounce 1.9s ease-in-out infinite;
    }

    .animal-ring span:nth-child(1) { left: 6.5rem; top: -0.5rem; animation-delay: -0.1s; }
    .animal-ring span:nth-child(2) { right: 0.4rem; top: 2.7rem; animation-delay: -0.5s; }
    .animal-ring span:nth-child(3) { right: 1.1rem; bottom: 2.5rem; animation-delay: -0.9s; }
    .animal-ring span:nth-child(4) { left: 6.5rem; bottom: -0.5rem; animation-delay: -1.3s; }
    .animal-ring span:nth-child(5) { left: 0.4rem; bottom: 2.6rem; animation-delay: -1.7s; }
    .animal-ring span:nth-child(6) { left: 1rem; top: 2.8rem; animation-delay: -2.1s; }

    .start-content h1 {
      font-size: 5.6rem;
      line-height: 0.95;
      letter-spacing: 0;
      color: #fffdf2;
      text-shadow: 0 0.45rem 1.8rem rgba(20, 47, 69, 0.35);
    }

    .start-content p {
      font-size: 2rem;
      font-weight: 800;
      color: #17324d;
      text-shadow: 0 0.15rem 0 rgba(255, 255, 255, 0.3);
    }

    #game {
      display: none;
      background: linear-gradient(180deg, var(--sky-a) 0%, var(--sky-b) 45%, var(--sky-c) 100%);
      transition: background 0.5s ease;
      isolation: isolate;
    }

    #game.active {
      display: block;
    }

    .sky-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 16%, rgba(255, 255, 255, 0.78), transparent 22rem),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 50%);
      opacity: 0.8;
      transition: opacity 0.5s ease;
      z-index: 0;
    }

    .celestial {
      position: absolute;
      top: 8%;
      right: 12%;
      width: 7rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--accent);
      box-shadow:
        0 0 0 1rem color-mix(in srgb, var(--accent), transparent 75%),
        0 0 4rem color-mix(in srgb, var(--accent), transparent 42%);
      z-index: 1;
      animation: sunPulse 3.2s ease-in-out infinite;
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }

    .cloud {
      position: absolute;
      width: 12rem;
      height: 4rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      z-index: 1;
      animation: drift 14s ease-in-out infinite alternate;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      bottom: 1.1rem;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before {
      left: 1.4rem;
      width: 4.5rem;
      aspect-ratio: 1;
    }

    .cloud::after {
      right: 1.5rem;
      width: 5.6rem;
      aspect-ratio: 1;
    }

    .cloud.one {
      top: 14%;
      left: 6%;
    }

    .cloud.two {
      top: 26%;
      right: 7%;
      transform: scale(0.72);
      animation-delay: -6s;
    }

    .cloud.three {
      top: 8%;
      left: 45%;
      transform: scale(0.58);
      animation-delay: -10s;
    }

    .hill {
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: 12%;
      height: 25%;
      border-radius: 50% 50% 0 0;
      z-index: 2;
      background: linear-gradient(135deg, var(--hill-a), var(--hill-b));
      transition: background 0.5s ease;
    }

    .hill.back {
      bottom: 22%;
      height: 18%;
      opacity: 0.55;
      transform: translateX(12%);
    }

    .ground {
      position: absolute;
      left: -5%;
      right: -5%;
      bottom: -2%;
      height: 28%;
      z-index: 3;
      border-radius: 50% 50% 0 0 / 24% 24% 0 0;
      background:
        linear-gradient(0deg, rgba(0, 0, 0, 0.1), transparent 56%),
        linear-gradient(135deg, var(--ground-a), var(--ground-b));
      box-shadow: inset 0 1rem 0 rgba(255, 255, 255, 0.12);
      transition: background 0.5s ease;
    }

    .ground::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(70deg, transparent 0 46%, rgba(255, 255, 255, 0.14) 47% 49%, transparent 50%),
        linear-gradient(110deg, transparent 0 45%, rgba(255, 255, 255, 0.12) 46% 48%, transparent 49%);
      background-size: 3rem 3rem, 4rem 3.4rem;
      opacity: 0.38;
      animation: grassSlide 7s linear infinite;
    }

    #decor-layer,
    #particle-layer,
    #ripple-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #decor-layer {
      z-index: 4;
    }

    .landmark {
      position: absolute;
      bottom: var(--bottom);
      left: var(--left);
      font-size: var(--size);
      filter: drop-shadow(0 0.35rem 0.4rem rgba(0, 0, 0, 0.12));
      animation: landmarkSway var(--sway) ease-in-out infinite alternate;
      transform-origin: 50% 100%;
    }

    #discovery-strip {
      position: absolute;
      top: 1rem;
      left: 50%;
      z-index: 12;
      display: flex;
      gap: 0.45rem;
      align-items: center;
      justify-content: center;
      width: min(42rem, calc(100% - 2rem));
      min-height: 3.2rem;
      transform: translateX(-50%);
    }

    .discovery-token {
      display: grid;
      place-items: center;
      flex: 0 0 2.45rem;
      width: 2.45rem;
      height: 2.45rem;
      border-radius: 50%;
      font-size: 1.35rem;
      color: transparent;
      background: rgba(255, 255, 255, 0.24);
      border: 0.16rem solid rgba(255, 255, 255, 0.42);
      box-shadow: inset 0 0.12rem 0.2rem rgba(255, 255, 255, 0.32);
      transform: scale(0.86);
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
    }

    .discovery-token.found {
      color: inherit;
      background: rgba(255, 255, 255, 0.76);
      transform: scale(1);
      animation: tokenPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .animal-wrap {
      position: absolute;
      left: 50%;
      top: 48%;
      z-index: 10;
      display: grid;
      place-items: center;
      width: 22rem;
      height: 22rem;
      transform: translate(-50%, -50%);
    }

    #animal-aura {
      position: absolute;
      width: 17rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0 38%, rgba(255, 255, 255, 0.28) 39% 62%, transparent 63%);
      filter: blur(0.2px);
      opacity: 0;
      transform: scale(0.4);
      transition: background 0.5s ease;
    }

    #animal-display {
      position: relative;
      z-index: 2;
      font-size: 13rem;
      line-height: 1;
      filter:
        drop-shadow(0 1rem 1.2rem rgba(18, 34, 52, 0.22))
        drop-shadow(0 0.2rem 0 rgba(255, 255, 255, 0.25));
      transform: scale(0);
      will-change: transform;
    }

    #animal-display.pop {
      animation: animalPop 0.68s cubic-bezier(0.17, 1.45, 0.38, 1) forwards;
    }

    #animal-aura.pop {
      animation: auraPop 0.78s ease forwards;
    }

    #animal-name,
    #animal-call {
      position: absolute;
      left: 50%;
      z-index: 11;
      width: min(42rem, calc(100% - 2rem));
      text-align: center;
      transform: translateX(-50%);
      color: white;
      text-shadow:
        0 0.24rem 0 rgba(23, 50, 77, 0.18),
        0 0.6rem 1.4rem rgba(23, 50, 77, 0.32);
      opacity: 0;
      pointer-events: none;
    }

    #animal-name {
      bottom: 9%;
      font-size: 4rem;
      line-height: 1;
      font-weight: 900;
    }

    #animal-call {
      top: 18%;
      font-size: 2.25rem;
      line-height: 1.1;
      font-weight: 900;
      color: #fffdf2;
    }

    #animal-name.show {
      animation: nameShow 1.35s ease forwards;
    }

    #animal-call.show {
      animation: callShow 1s ease forwards;
    }

    .particle {
      position: absolute;
      z-index: 15;
      font-size: var(--size);
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0.25rem 0.32rem rgba(0, 0, 0, 0.16));
      animation: particleFly var(--dur) ease-out forwards;
      will-change: transform, opacity;
    }

    .ripple {
      position: absolute;
      z-index: 8;
      width: 2rem;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 0.22rem solid rgba(255, 255, 255, 0.8);
      transform: translate(-50%, -50%) scale(0.2);
      animation: rippleOut 0.6s ease-out forwards;
    }

    .spark-line {
      position: absolute;
      z-index: 9;
      left: 50%;
      top: 50%;
      width: 0.36rem;
      height: 7rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      transform-origin: center 0;
      animation: rayBurst 0.62s ease-out forwards;
    }

    .complete-flash {
      animation: completeFlash 0.85s ease;
    }

    @keyframes animalPop {
      0% {
        transform: scale(0) rotate(-18deg);
        opacity: 0;
      }
      42% {
        transform: scale(1.18) rotate(5deg);
        opacity: 1;
      }
      70% {
        transform: scale(0.92) rotate(-2deg);
      }
      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    @keyframes auraPop {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      45% {
        transform: scale(1.15);
        opacity: 0.86;
      }
      100% {
        transform: scale(1);
        opacity: 0.54;
      }
    }

    @keyframes nameShow {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(1.2rem) scale(0.94);
      }
      28% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1.04);
      }
      100% {
        opacity: 0.92;
        transform: translateX(-50%) translateY(0) scale(1);
      }
    }

    @keyframes callShow {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(1.4rem) scale(0.88);
      }
      32% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1.08);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-1.4rem) scale(1);
      }
    }

    @keyframes particleFly {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--scale)) rotate(var(--rot));
      }
    }

    @keyframes rippleOut {
      0% {
        opacity: 0.9;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(7);
      }
    }

    @keyframes rayBurst {
      0% {
        opacity: 0.8;
        transform: translate(-50%, -50%) rotate(var(--angle)) scaleY(0.25);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) scaleY(1.25) translateY(-5rem);
      }
    }

    @keyframes completeFlash {
      0%, 100% { filter: saturate(1) brightness(1); }
      45% { filter: saturate(1.5) brightness(1.2); }
    }

    @keyframes tokenPop {
      0% { transform: scale(0.2) rotate(-25deg); }
      70% { transform: scale(1.18) rotate(8deg); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes drift {
      0% { margin-left: -1rem; }
      100% { margin-left: 1.4rem; }
    }

    @keyframes grassSlide {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 3rem 0, -4rem 0; }
    }

    @keyframes landmarkSway {
      0% { transform: rotate(-3deg) translateY(0); }
      100% { transform: rotate(3deg) translateY(-0.35rem); }
    }

    @keyframes ringFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.8rem); }
    }

    @keyframes tinyBounce {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-0.7rem) rotate(3deg); }
    }

    @media (max-width: 760px) {
      .start-content {
        gap: 0.8rem;
        transform: translateY(-1rem);
      }

      .animal-ring {
        width: 14.5rem;
      }

      .animal-ring span {
        width: 3.9rem;
        font-size: 2.05rem;
      }

      .animal-ring span:nth-child(1) { left: 5.3rem; top: -0.4rem; }
      .animal-ring span:nth-child(2) { right: 0.3rem; top: 2.2rem; }
      .animal-ring span:nth-child(3) { right: 0.8rem; bottom: 2.1rem; }
      .animal-ring span:nth-child(4) { left: 5.3rem; bottom: -0.4rem; }
      .animal-ring span:nth-child(5) { left: 0.3rem; bottom: 2.1rem; }
      .animal-ring span:nth-child(6) { left: 0.8rem; top: 2.2rem; }

      .start-content h1 {
        font-size: 3.7rem;
      }

      .start-content p {
        font-size: 1.45rem;
      }

      .start-sun,
      .celestial {
        width: 5rem;
      }

      .start-cloud,
      .cloud {
        width: 8rem;
        height: 2.9rem;
      }

      .animal-wrap {
        top: 47%;
        width: 18rem;
        height: 18rem;
      }

      #animal-aura {
        width: 13rem;
      }

      #animal-display {
        font-size: 9.2rem;
      }

      #animal-name {
        bottom: 10%;
        font-size: 2.55rem;
      }

      #animal-call {
        top: 18%;
        font-size: 1.55rem;
      }

      #discovery-strip {
        top: 0.65rem;
        gap: 0.25rem;
        min-height: 2.7rem;
      }

      .discovery-token {
        flex-basis: 1.85rem;
        width: 1.85rem;
        height: 1.85rem;
        font-size: 1rem;
        border-width: 0.11rem;
      }

      .hill.back {
        bottom: 25%;
      }

      .ground {
        height: 25%;
      }
    }

    @media (min-width: 1180px) {
      .animal-wrap {
        width: 26rem;
        height: 26rem;
      }

      #animal-aura {
        width: 20rem;
      }

      #animal-display {
        font-size: 16rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="start-screen" aria-label="Animais">
    <div class="start-scenery" aria-hidden="true">
      <div class="start-sun"></div>
      <div class="start-cloud one"></div>
      <div class="start-cloud two"></div>
      <div class="start-cloud three"></div>
      <div class="start-hill back"></div>
      <div class="start-hill"></div>
    </div>
    <main class="start-content">
      <div class="animal-ring" aria-hidden="true">
        <span>🐱</span>
        <span>🐶</span>
        <span>🐮</span>
        <span>🦁</span>
        <span>🐸</span>
        <span>🦆</span>
      </div>
      <h1>Animais!</h1>
      <p>Vamos brincar?</p>
    </main>
  </div>

  <div id="game" aria-live="polite">
    <div class="sky-glow"></div>
    <div class="celestial"></div>
    <div class="cloud one"></div>
    <div class="cloud two"></div>
    <div class="cloud three"></div>
    <div class="hill back"></div>
    <div class="hill"></div>
    <div class="ground"></div>
    <div id="decor-layer" aria-hidden="true"></div>
    <div id="ripple-layer" aria-hidden="true"></div>
    <div id="particle-layer" aria-hidden="true"></div>
    <div id="discovery-strip" aria-hidden="true"></div>
    <div class="animal-wrap" aria-hidden="true">
      <div id="animal-aura"></div>
      <div id="animal-display"></div>
    </div>
    <div id="animal-call"></div>
    <div id="animal-name"></div>
  </div>

  <script>
    const DEBOUNCE_MS = 135;
    const INPUT_EVENTS = ["keydown", "keyup", "keypress", "beforeinput", "input"];
    const CENTER_POINT = () => ({ x: window.innerWidth / 2, y: window.innerHeight / 2 });

    const animals = [
      {
        emoji: "🐱",
        name: "Gato",
        call: "Miau!",
        sound: "sounds/cat.mp3",
        palette: ["#78d5e3", "#ffe08a", "#ffb703", "#64b96a", "#4d9f52", "#ff8fab", "rgba(255, 247, 214, 0.92)"],
        particles: ["🐾", "✨", "🌸"],
        scenery: ["🌼", "🌿", "🏠", "🌷"]
      },
      {
        emoji: "🐶",
        name: "Cachorro",
        call: "Au-au!",
        sound: "sounds/dog.mp3",
        palette: ["#86e3ce", "#f7e987", "#fcbf49", "#5bbf72", "#2f9e44", "#f77f00", "rgba(255, 255, 240, 0.94)"],
        particles: ["🐾", "⭐", "🦴"],
        scenery: ["🌳", "🌻", "🪵", "🌿"]
      },
      {
        emoji: "🐮",
        name: "Vaca",
        call: "Muuu!",
        sound: "sounds/cow.mp3",
        palette: ["#8ecae6", "#d9f99d", "#ffe066", "#75b843", "#4d908e", "#f4a261", "rgba(255, 255, 255, 0.92)"],
        particles: ["🌼", "☘️", "✨"],
        scenery: ["🌾", "🌼", "🚜", "🌳"]
      },
      {
        emoji: "🐷",
        name: "Porco",
        call: "Oinc!",
        sound: "sounds/pig.mp3",
        palette: ["#ffd6a5", "#fdffb6", "#caffbf", "#8ac926", "#6a994e", "#ff7096", "rgba(255, 235, 242, 0.94)"],
        particles: ["🌸", "💦", "✨"],
        scenery: ["🌻", "🌿", "🪵", "🌷"]
      },
      {
        emoji: "🐑",
        name: "Ovelha",
        call: "Mééé!",
        sound: "sounds/sheep.mp3",
        palette: ["#bde0fe", "#fff1a8", "#ffcad4", "#95d5b2", "#52b788", "#f7b267", "rgba(255, 255, 255, 0.95)"],
        particles: ["☁️", "🌼", "✨"],
        scenery: ["🌾", "🌼", "🌳", "☁️"]
      },
      {
        emoji: "🐔",
        name: "Galinha",
        call: "Có-có!",
        sound: "sounds/chicken.mp3",
        palette: ["#f9c74f", "#ffd166", "#fefae0", "#70e000", "#38b000", "#ef476f", "rgba(255, 248, 220, 0.95)"],
        particles: ["🌽", "⭐", "✨"],
        scenery: ["🌽", "🌾", "🏡", "🌻"]
      },
      {
        emoji: "🦆",
        name: "Pato",
        call: "Quac!",
        sound: "sounds/duck.mp3",
        palette: ["#74c0fc", "#b8f2e6", "#fee440", "#00b4d8", "#168aad", "#ffd60a", "rgba(232, 252, 255, 0.94)"],
        particles: ["💧", "🫧", "✨"],
        scenery: ["🌊", "🌿", "🪷", "🌾"]
      },
      {
        emoji: "🐸",
        name: "Sapo",
        call: "Croac!",
        sound: "sounds/frog.mp3",
        palette: ["#80ed99", "#c7f9cc", "#57cc99", "#38a3a5", "#22577a", "#ffd166", "rgba(235, 255, 238, 0.94)"],
        particles: ["💧", "🪷", "✨"],
        scenery: ["🪷", "🌿", "🌊", "🌾"]
      },
      {
        emoji: "🐦",
        name: "Pássaro",
        call: "Piu-piu!",
        sound: "sounds/bird.mp3",
        palette: ["#90dbf4", "#a3c4f3", "#cfbaf0", "#76c893", "#52b788", "#ffafcc", "rgba(245, 252, 255, 0.94)"],
        particles: ["🎵", "🌸", "✨"],
        scenery: ["🌳", "🌷", "☁️", "🌼"]
      },
      {
        emoji: "🦁",
        name: "Leão",
        call: "Roar!",
        sound: "sounds/lion.mp3",
        palette: ["#f4a261", "#e9c46a", "#fff3b0", "#8ab17d", "#588157", "#e76f51", "rgba(255, 236, 194, 0.94)"],
        particles: ["🔥", "⭐", "🌾"],
        scenery: ["🌴", "🌾", "☀️", "🌿"]
      },
      {
        emoji: "🐘",
        name: "Elefante",
        call: "Pruuu!",
        sound: "sounds/elephant.mp3",
        palette: ["#9bf6ff", "#bdb2ff", "#ffc6ff", "#84a98c", "#52796f", "#48cae4", "rgba(240, 250, 255, 0.94)"],
        particles: ["💦", "🌿", "✨"],
        scenery: ["🌴", "🌊", "🌿", "🌼"]
      },
      {
        emoji: "🐵",
        name: "Macaco",
        call: "Uh-uh!",
        sound: "sounds/monkey.mp3",
        palette: ["#95d5b2", "#fefae0", "#dda15e", "#2d6a4f", "#40916c", "#ffba08", "rgba(252, 247, 218, 0.95)"],
        particles: ["🍌", "🌿", "✨"],
        scenery: ["🌴", "🍌", "🌿", "🌳"]
      }
    ];

    const soundPlayers = new Map();
    const discovered = new Set();
    let lastTrigger = 0;
    let started = false;
    let lastAnimalIndex = -1;
    let exitingWithEsc = false;
    let completedOnce = false;

    const startScreen = document.getElementById("start-screen");
    const game = document.getElementById("game");
    const animalDisplay = document.getElementById("animal-display");
    const animalAura = document.getElementById("animal-aura");
    const animalName = document.getElementById("animal-name");
    const animalCall = document.getElementById("animal-call");
    const decorLayer = document.getElementById("decor-layer");
    const particleLayer = document.getElementById("particle-layer");
    const rippleLayer = document.getElementById("ripple-layer");
    const discoveryStrip = document.getElementById("discovery-strip");

    function preloadSounds() {
      animals.forEach((animal) => {
        if (soundPlayers.has(animal.sound)) return;
        const audio = new Audio(animal.sound);
        audio.preload = "auto";
        audio.load();
        soundPlayers.set(animal.sound, audio);
      });
    }

    function playAnimalSound(soundPath) {
      let template = soundPlayers.get(soundPath);
      if (!template) {
        template = new Audio(soundPath);
        template.preload = "auto";
        soundPlayers.set(soundPath, template);
      }

      const audio = template.cloneNode(true);
      audio.volume = 1;
      audio.play().catch(() => {});
    }

    function randomAnimal() {
      let idx;
      do {
        idx = Math.floor(Math.random() * animals.length);
      } while (idx === lastAnimalIndex && animals.length > 1);

      lastAnimalIndex = idx;
      return { animal: animals[idx], idx };
    }

    function buildDiscoveryStrip() {
      const tokens = animals.map(() => {
        const token = document.createElement("span");
        token.className = "discovery-token";
        return token;
      });
      discoveryStrip.replaceChildren(...tokens);
    }

    function applyPalette(animal) {
      const [skyA, skyB, skyC, groundA, groundB, accent, glow] = animal.palette;
      game.style.setProperty("--sky-a", skyA);
      game.style.setProperty("--sky-b", skyB);
      game.style.setProperty("--sky-c", skyC);
      game.style.setProperty("--ground-a", groundA);
      game.style.setProperty("--ground-b", groundB);
      game.style.setProperty("--hill-a", groundB);
      game.style.setProperty("--hill-b", groundA);
      game.style.setProperty("--accent", accent);
      game.style.setProperty("--glow", glow);
    }

    function paintScenery(animal) {
      const slots = [
        { left: 7, bottom: 19, size: 2.4 },
        { left: 18, bottom: 12, size: 2 },
        { left: 75, bottom: 16, size: 2.8 },
        { left: 88, bottom: 10, size: 2.1 },
        { left: 33, bottom: 24, size: 2.2 },
        { left: 62, bottom: 23, size: 2.35 }
      ];

      const marks = slots.map((slot, index) => {
        const mark = document.createElement("span");
        mark.className = "landmark";
        mark.textContent = animal.scenery[index % animal.scenery.length];
        mark.style.setProperty("--left", `${slot.left}%`);
        mark.style.setProperty("--bottom", `${slot.bottom}%`);
        mark.style.setProperty("--size", `${slot.size}rem`);
        mark.style.setProperty("--sway", `${2.6 + index * 0.3}s`);
        return mark;
      });

      decorLayer.replaceChildren(...marks);
    }

    function restartAnimation(element, className) {
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
    }

    function updateDiscovery(index, animal) {
      discovered.add(index);
      const token = discoveryStrip.children[index];
      if (token) {
        token.textContent = animal.emoji;
        token.classList.add("found");
      }

      if (discovered.size === animals.length && !completedOnce) {
        completedOnce = true;
        celebrateCollection();
      }
    }

    function showAnimal(animal) {
      animalDisplay.textContent = animal.emoji;
      animalName.textContent = animal.name;
      animalCall.textContent = animal.call;

      restartAnimation(animalDisplay, "pop");
      restartAnimation(animalAura, "pop");
      restartAnimation(animalName, "show");
      restartAnimation(animalCall, "show");
    }

    function burstParticles(point, animal, amount = 13) {
      for (let i = 0; i < amount; i++) {
        const particle = document.createElement("span");
        const angle = (Math.PI * 2 * i) / amount + Math.random() * 0.5;
        const distance = 75 + Math.random() * 175;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance - 45;
        const icon = animal.particles[Math.floor(Math.random() * animal.particles.length)];

        particle.className = "particle";
        particle.textContent = icon;
        particle.style.left = `${point.x}px`;
        particle.style.top = `${point.y}px`;
        particle.style.setProperty("--dx", `${dx}px`);
        particle.style.setProperty("--dy", `${dy}px`);
        particle.style.setProperty("--rot", `${-180 + Math.random() * 360}deg`);
        particle.style.setProperty("--scale", `${0.7 + Math.random() * 0.7}`);
        particle.style.setProperty("--size", `${1.35 + Math.random() * 1.15}rem`);
        particle.style.setProperty("--dur", `${0.75 + Math.random() * 0.55}s`);
        particleLayer.appendChild(particle);
        particle.addEventListener("animationend", () => particle.remove());
      }
    }

    function ripple(point) {
      const ring = document.createElement("span");
      ring.className = "ripple";
      ring.style.left = `${point.x}px`;
      ring.style.top = `${point.y}px`;
      rippleLayer.appendChild(ring);
      ring.addEventListener("animationend", () => ring.remove());
    }

    function lightBurst() {
      for (let i = 0; i < 10; i++) {
        const ray = document.createElement("span");
        ray.className = "spark-line";
        ray.style.setProperty("--angle", `${i * 36}deg`);
        particleLayer.appendChild(ray);
        ray.addEventListener("animationend", () => ray.remove());
      }
    }

    function celebrateCollection() {
      game.classList.add("complete-flash");
      game.addEventListener("animationend", () => game.classList.remove("complete-flash"), { once: true });

      const point = CENTER_POINT();
      animals.forEach((animal, index) => {
        setTimeout(() => burstParticles(point, animal, 5), index * 35);
      });
      lightBurst();
    }

    function triggerAnimal(point = CENTER_POINT()) {
      const now = performance.now();
      if (now - lastTrigger < DEBOUNCE_MS) return;
      lastTrigger = now;

      const { animal, idx } = randomAnimal();
      applyPalette(animal);
      paintScenery(animal);
      playAnimalSound(animal.sound);
      showAnimal(animal);
      updateDiscovery(idx, animal);
      burstParticles(point, animal);
      ripple(point);
      lightBurst();
    }

    function startApp() {
      if (started) return;
      started = true;
      preloadSounds();
      startScreen.classList.add("hidden");
      game.classList.add("active");

      try {
        document.documentElement.requestFullscreen?.();
      } catch (_) {}
    }

    function stopBrowserShortcut(e) {
      if (!e) return;
      e.preventDefault();
      e.stopPropagation();
      if (e.stopImmediatePropagation) e.stopImmediatePropagation();
    }

    function exitGame() {
      exitingWithEsc = true;
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
      setTimeout(() => { exitingWithEsc = false; }, 300);
    }

    function lockKeyboard(e) {
      if (e.type === "keydown" && e.key === "Escape") {
        stopBrowserShortcut(e);
        exitGame();
        return;
      }

      stopBrowserShortcut(e);

      if (e.type === "keydown" && !e.repeat) {
        if (!started) startApp();
        else if (!exitingWithEsc && !document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
        }
        triggerAnimal();
      }
    }

    function pointerPoint(e) {
      const touch = e.touches?.[0] || e.changedTouches?.[0];
      return {
        x: touch?.clientX ?? e.clientX ?? window.innerWidth / 2,
        y: touch?.clientY ?? e.clientY ?? window.innerHeight / 2
      };
    }

    function handlePointerInput(e) {
      stopBrowserShortcut(e);
      const point = pointerPoint(e);
      if (!started) startApp();
      triggerAnimal(point);
    }

    function keepGameFullscreen() {
      if (!started || exitingWithEsc || document.fullscreenElement) return;
      document.documentElement.requestFullscreen?.().catch(() => {});
    }

    INPUT_EVENTS.forEach((type) => {
      window.addEventListener(type, lockKeyboard, { capture: true, passive: false });
      document.addEventListener(type, lockKeyboard, { capture: true, passive: false });
    });

    ["contextmenu", "selectstart", "dragstart", "drop", "wheel"].forEach((type) => {
      window.addEventListener(type, stopBrowserShortcut, { capture: true, passive: false });
      document.addEventListener(type, stopBrowserShortcut, { capture: true, passive: false });
    });

    window.addEventListener("blur", () => {
      if (started && !exitingWithEsc) window.focus();
    });

    document.addEventListener("fullscreenchange", keepGameFullscreen);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) keepGameFullscreen();
    });

    startScreen.addEventListener("click", handlePointerInput);
    startScreen.addEventListener("touchstart", handlePointerInput, { passive: false });
    game.addEventListener("click", handlePointerInput);
    game.addEventListener("touchstart", handlePointerInput, { passive: false });

    buildDiscoveryStrip();
    preloadSounds();
  </script>
</body>
